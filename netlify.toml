[build]
  command = "npm install"

[functions]
  directory = "netlify/functions"
  # pdfkit shrift fayllari (.afm) — bular bo'lmasa PDF generatsiya funksiyalari
  # (shartnoma yuklab olish) xato beradi. Bu Netlify'da pdfkit ishlatishning
  # mashhur "tuzog'i" — shrift fayllari avtomatik bog'lanmaydi (bundle),
  # shu sabab bu yerda ANIQ ko'rsatib qo'yamiz.
  included_files = ["node_modules/pdfkit/js/data/*.afm"]

[functions."check-credit-payments"]
  schedule = "0 */6 * * *"

[functions."credit-excel-report"]
  schedule = "0 4 * * *"

# HTML sahifalar HECH QACHON eski nusxada keshda qolib ketmasin — har safar
# brauzer serverdan eng yangi versiyani tekshirib oladi (sekin internetda ham).
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Rasm/logo kabi statik fayllar tez yuklanishi uchun keshlansa bo'ladi —
# ular kamdan-kam o'zgaradi.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"
